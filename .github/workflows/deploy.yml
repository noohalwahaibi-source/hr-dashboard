name: Deploy to Netlify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Netlify via CLI
        run: |
          npm install -g netlify-cli --silent
          netlify deploy --prod --dir=. --auth=${{ secrets.NETLIFY_PAT }} --site=06495289-83de-45ff-b623-0e595632cbbf
